<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zina IA</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    #chat-container { width: 100%; max-width: 700px; height: 90vh; background: white; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); display: flex; flex-direction: column; overflow: hidden; }
    #header { background: #1A6FD4; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    #header .title { font-size: 16px; font-weight: 600; }
    #header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .msg { display: flex; gap: 8px; max-width: 80%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
    .msg.bot .msg-avatar { background: #e1edf5; color: #1A6FD4; }
    .msg.user .msg-avatar { background: #1A6FD4; color: white; }
    .bubble { padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
    .msg.bot .bubble { background: #f1f1f1; color: #222; border-bottom-left-radius: 4px; }
    .msg.user .bubble { background: #1A6FD4; color: white; border-bottom-right-radius: 4px; }
    .typing-dots { display: flex; gap: 5px; padding: 4px 2px; }
    .typing-dots span { width: 8px; height: 8px; border-radius: 50%; background: #888; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
    #input-area { padding: 14px 16px; border-top: 1px solid #eee; background: #fafafa; display: flex; flex-direction: column; gap: 8px; }
    #file-preview { display: none; background: #e8f0fe; padding: 8px 12px; border-radius: 8px; font-size: 13px; color: #1A6FD4; }
    #input-row { display: flex; gap: 10px; align-items: flex-end; }
    #user-input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; font-family: inherit; resize: none; outline: none; min-height: 42px; max-height: 120px; }
    #user-input:focus { border-color: #1A6FD4; }
    #send-btn { width: 42px; height: 42px; border-radius: 50%; background: #1A6FD4; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #send-btn:hover { background: #1558B0; }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }
    .sys-msg { text-align: center; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
<div id="chat-container">
  <div id="header">
    <div>
      <svg width="40" height="40" viewBox="0 0 100 100">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#FFE066"/><stop offset="100%" style="stop-color:#B8860B"/></linearGradient></defs>
        <rect width="100" height="100" rx="12" fill="#0D0D1A"/>
        <text x="50" y="68" text-anchor="middle" font-family="Georgia,serif" font-size="42" font-weight="700" fill="url(#g)">Z</text>
      </svg>
    </div>
    <div>
      <div class="title">Zina IA</div>
      <div class="subtitle">Votre assistante professionnelle</div>
    </div>
  </div>
  <div id="messages">
    <div class="sys-msg">— Début de la conversation —</div>
    <div class="msg bot">
      <div class="msg-avatar">AI</div>
      <div class="bubble">Bonjour ! Je suis Zina IA, votre assistante professionnelle. Comment puis-je vous aider aujourd'hui ? 👋</div>
    </div>
  </div>
  <div id="input-area">
    <div id="file-preview">📷 <span id="file-name"></span> <button onclick="clearFile()" style="background:none;border:none;cursor:pointer;color:red;">✕</button></div>
    <div id="input-row">
      <button onclick="document.getElementById('file-input').click()" style="width:42px;height:42px;border-radius:50%;background:#f0f0f0;border:none;cursor:pointer;font-size:20px;">📷</button>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this)"/>
      <textarea id="user-input" placeholder="Écrivez votre message..." rows="1"></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const history = [];
  let currentFile = null;
  let currentFileType = null;

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      currentFile = e.target.result.split(',')[1];
      currentFileType = file.type;
      document.getElementById('file-name').textContent = file.name;
      document.getElementById('file-preview').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function clearFile() {
    currentFile = null;
    currentFileType = null;
    document.getElementById('file-input').value = '';
    document.getElementById('file-preview').style.display = 'none';
  }

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'user' ? 'Vous' : 'AI';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = text;
    wrap.appendChild(av);
    wrap.appendChild(bub);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing';
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = 'AI';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    wrap.appendChild(av);
    wrap.appendChild(bub);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    sendBtn.disabled = true;
    addMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();
    try {
      const res = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: history }) });
      const data = await res.json();
      document.getElementById('typing')?.remove();
      const reply = data.reply || data.error || 'Erreur inconnue.';
      addMessage('bot', reply);
      if (data.reply) history.push({ role: 'assistant', content: reply });
    } catch (err) {
      document.getElementById('typing')?.remove();
      addMessage('bot', 'Erreur de connexion au serveur.');
    }
    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  inputEl.addEventListener('input', () => { inputEl.style.height = 'auto'; inputEl.style.height = inputEl.scrollHeight + 'px'; });
</script>
</body>
</html>
